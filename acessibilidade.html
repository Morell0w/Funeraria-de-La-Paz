<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Painel de Acessibilidade - Funerária de La Paz">
    <link href="funcionários.css" rel="stylesheet">
    <link href="acessibilidade.css" rel="stylesheet">
    <link href="header-footer.css" rel="stylesheet">
    <script src="acessibilidade.js"></script>
    <title>Acessibilidade - Funerária de La Paz</title>
</head>
<body>
    <a id="pular" href="#main-content" class="skip-link">Pular para o conteúdo principal</a>
    
    <header id="head1" aria-label="Cabeçalho do site">
        <div id="logo">
            <img src="ccd43164-5520-470d-b7e7-92dbdd34407a.png" alt="Logo da Funerária de La Paz - Pomba">
            <h1>Funerária de La Paz</h1>
        </div>
        <nav id="links1" aria-label="Navegação principal">
            <a href="index.html">Inicio</a>
            <a href="#">Assistência Social</a>
            <a href="agenda.html">Agenda</a>
            <a href="acessibilidade.html" aria-current="page">Acessibilidade</a>
            <a href="login.html">Login</a>
            <a href="funcionarios.html">Funcionários</a>
        </nav>
    </header>

    <main id="main-content" role="main">
        <div class="geral1">
            <div class="painel-acessibilidade">
                <h2>Painel de Acessibilidade</h2>
                
                <fieldset>
                    <legend>Modo de Visualização</legend>
                    <label for="toggle-contraste">
                        <input type="checkbox" id="toggle-contraste" class="checkbox-acessivel" aria-label="Ativar modo escuro">
                        <span class="btn-acessivel">Modo Escuro</span>
                    </label>
                </fieldset>

                <fieldset class="grupo-fontes">
                    <legend>Tamanho da Fonte</legend>
                    
                    <label for="fonte-padrao">
                        <input type="radio" id="fonte-padrao" name="escala-fonte" checked/>
                        <span class="btn-acessivel">Padrão</span>
                    </label>

                    <label for="fonte-media">
                        <input type="radio" id="fonte-media" name="escala-fonte"/>
                        <span class="btn-acessivel">Média</span>
                    </label>

                    <label for="fonte-grande">
                        <input type="radio" id="fonte-grande" name="escala-fonte"/>
                        <span class="btn-acessivel">Grande</span>
                    </label>

                    <label for="fonte-daniel">
                        <input type="radio" id="fonte-daniel" name="escala-fonte"/>
                        <span class="btn-acessivel">Daniel</span>
                    </label>
                </fieldset>
            </div>
        </div>
    </main>
    <footer role="contentinfo" aria-label="Rodapé do site">
        <div class="rodape-conteudo">
            <p>&copy; 2026 Funerária de La Paz, Todos os direitos reservados</p>
            <nav class="footer-links" aria-label="Links do rodapé">
                <a href="acessibilidade.html" aria-label="Painel de Acessibilidade" aria-current="page">Acessibilidade</a>
                <a href="ajuda.html" aria-label="Página de Ajuda">Ajuda</a>
            </nav>
        </div>
    </footer>
</body>
</html>
